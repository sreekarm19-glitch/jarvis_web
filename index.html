<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="logo-box">
      <div class="logo-circle">J.A.R.V.I.S</div>
    </div>


<button class="nav-btn active">Home</button>
<button class="nav-btn">Chat</button>
<button class="nav-btn" id="voiceBtn">Voice: Deep</button>
<button class="nav-btn">Vision</button>
<button class="nav-btn">System</button>
<button class="nav-btn">Memory</button>
<button class="nav-btn">Tools</button>
<button class="nav-btn">Settings</button>

<div class="listening-box">
  <span id="listenStatus">System Ready</span>
</div>


  </aside>

  <main class="main">
    <section class="center-panel">
      <div class="hud-ring">
        <div class="hud-content">
          <h1>HELLO</h1>
          <p>How can I help you today?</p>


      <div class="chat-bar">
        <input id="commandInput" type="text" placeholder="Ask me anything..." />
        <button id="micBtn">MIC</button>
        <button id="muteBtn">MUTE</button>
        <button id="sendBtn">SEND</button>
      </div>

      <div id="responseBox">JARVIS online. Awaiting command...</div>
    </div>
  </div>
</section>


  </main>

  <aside class="right-panel">
    <div class="card clock-card">
      <h2 id="time">00:00</h2>
      <p id="date">Loading...</p>
    </div>


<div class="card">
  <h3>SYSTEM STATUS</h3>

  <div class="stat">
    <span>CPU</span>
    <div class="bar">
      <div id="cpuBar" style="width:0%"></div>
    </div>
    <b id="cpuText">0%</b>
  </div>

  <div class="stat">
    <span>RAM</span>
    <div class="bar">
      <div id="ramBar" style="width:0%"></div>
    </div>
    <b id="ramText">0%</b>
  </div>

  <div class="stat">
    <span>BATTERY</span>
    <div class="bar">
      <div id="batteryBar" style="width:0%"></div>
    </div>
    <b id="batteryText">...</b>
  </div>
</div>

<div class="card">
  <h3>QUICK ACCESS</h3>

  <div class="quick-grid">
    <button data-action="google">Web Search</button>
    <button data-action="youtube">YouTube</button>
    <button data-action="netflix">Netflix</button>
    <button data-action="swiggy">Swiggy</button>
    <button data-action="weather">Weather</button>
    <button data-action="calculator">Calculator</button>
    <button id="connectGlassesBtn">Connect EDITH</button>
  </div>
</div>

<div class="card">
  <h3>VIRTUAL GLASSES OLED</h3>

  <div class="virtual-oled" id="virtualOled">
    E.D.I.T.H ONLINE<br>
    Awaiting command...
  </div>
</div>


  </aside>

</div>

<script src="script.js?v=31"></script>

</body>
</html>
