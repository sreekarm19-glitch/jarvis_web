<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS</title>
  <link rel="stylesheet" href="style.css?v=201" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">J</div>
        <div>
          <h1>J.A.R.V.I.S</h1>
          <p>AI Assistant</p>
        </div>
      </div>

      <nav class="nav-list">
        <button class="nav-item active">⌂ <span>Home</span></button>
        <button class="nav-item">◌ <span>Chat</span></button>
        <button class="nav-item" id="voiceBtn">≋ <span>Voice: Deep</span></button>
        <button class="nav-item">◉ <span>Vision</span></button>
        <button class="nav-item">▣ <span>System</span></button>
        <button class="nav-item">◎ <span>Memory</span></button>
        <button class="nav-item">⚒ <span>Tools</span></button>
        <button class="nav-item">⚙ <span>Settings</span></button>
      </nav>

      <div class="sidebar-bottom">
        <button class="connect-btn" id="connectGlassesBtn">Connect EDITH</button>
        <div class="online-card">
          <div class="small-avatar">J</div>
          <div>
            <strong>JARVIS</strong>
            <p><span></span> Online</p>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-area">
      <section class="hero">
        <p class="eyebrow">Personal AI System</p>
        <h2>Hello.</h2>
        <p>How can I help you today?</p>
      </section>

      <section class="chat-panel">
        <div class="chat-header">
          <div>
            <h3>JARVIS Chat</h3>
            <p id="listenStatus">System Active</p>
          </div>
          <div class="time-pill">
            <span id="time">00:00</span>
            <small id="date">Loading...</small>
          </div>
        </div>

        <div class="chat-scroll">
          <div class="message assistant">
            <div class="avatar">J</div>
            <div class="message-content">
              <div class="message-meta">
                <strong>JARVIS</strong>
                <span>Now</span>
              </div>
              <p>How can I assist you today?</p>
            </div>
          </div>

          <div class="message assistant response-message">
            <div class="avatar">J</div>
            <div class="message-content">
              <div class="message-meta">
                <strong>Response</strong>
                <span>Live</span>
              </div>
              <p id="responseBox">Ready when you are.</p>
            </div>
          </div>
        </div>
      </section>

      <section class="input-section">
        <div class="input-bar">
          <input id="commandInput" type="text" placeholder="Ask JARVIS anything..." autocomplete="off" />
          <button id="micBtn">MIC</button>
          <button id="muteBtn">MUTE</button>
          <button id="sendBtn">SEND</button>
        </div>

        <div class="quick-grid">
          <button data-action="google">🌐 Web Search</button>
          <button data-action="youtube">▶ YouTube</button>
          <button data-action="weather">☁ Weather</button>
          <button data-action="calculator">🧮 Calculator</button>
          <button data-action="netflix">N Netflix</button>
          <button data-action="swiggy">🍽 Swiggy</button>
          <button onclick="document.getElementById('commandInput').value='activate emergency'; document.getElementById('sendBtn').click();" class="danger">🚨 Emergency SOS</button>
        </div>
      </section>

      <div class="virtual-oled" id="virtualOled">
        JARVIS ONLINE<br>
        Awaiting command...
      </div>

      <div class="hidden-status">
        <span id="cpuText">0%</span>
        <span id="ramText">0%</span>
        <span id="batteryText">0%</span>
        <div id="cpuBar"></div>
        <div id="ramBar"></div>
        <div id="batteryBar"></div>
      </div>
    </main>
  </div>

  <script src="script.js?v=201"></script>
  <script src="ui.js?v=1"></script>
</body>
</html>
